<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Semi-Abstract Photo Mode</title>
  <style>
    body { font-family: sans-serif; padding: 10px; background: #111; color: #eee; }
    #wrap { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    video, canvas { max-width: 100%; border: 1px solid #444; background: #000; }
    button { padding: 6px 12px; margin: 0 4px; }
    #buttons { display: flex; gap: 8px; }
  </style>
</head>
<body>
<div id="wrap">
  <h2>Semi-Abstract Photo（原形強め）</h2>

  <div id="buttons">
    <button id="startBtn">カメラ開始</button>
    <button id="shotBtn" disabled>シャッター</button>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<script>
const startBtn = document.getElementById('startBtn');
const shotBtn  = document.getElementById('shotBtn');
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');

let stream = null;

// カメラ開始
startBtn.addEventListener('click', async () => {
  if (stream) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });
    video.srcObject = stream;

    video.addEventListener('loadedmetadata', () => {
      const maxW = 900;
      const scale = Math.min(maxW / video.videoWidth, 1);
      canvas.width  = video.videoWidth * scale;
      canvas.height = video.videoHeight * scale;
      shotBtn.disabled = false;
    }, { once: true });

  } catch (e) {
    alert('カメラにアクセスできませんでした');
  }
});

// シャッター → 抽象化
shotBtn.addEventListener('click', () => {
  if (!stream) return;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  makeAbstract();
});

// -----------------------------
// 原形強め・半抽象モード
// -----------------------------
function makeAbstract() {
  const w = canvas.width;
  const h = canvas.height;
  const imgData = ctx.getImageData(0, 0, w, h).data;

  const step = 9; // 原形強め

  const points = [];
  for (let y = 0; y <= h; y += step) {
    for (let x = 0; x <= w; x += step) {

      // 揺れを極小にして原形を残す
      let jitterX = x + (Math.random() - 0.5) * step * 0.04;
      let jitterY = y + (Math.random() - 0.5) * step * 0.04;

      points.push({
        x: Math.max(0, Math.min(w, jitterX)),
        y: Math.max(0, Math.min(h, jitterY))
      });
    }
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  const cols = Math.floor(w / step) + 1;
  const rows = Math.floor(h / step) + 1;

  for (let j = 0; j < rows - 1; j++) {
    for (let i = 0; i < cols - 1; i++) {
      const p0 = points[j * cols + i];
      const p1 = points[j * cols + i + 1];
      const p2 = points[(j + 1) * cols + i];
      const p3 = points[(j + 1) * cols + i + 1];

      drawQuad(p0, p1, p2, p3, imgData, w);
    }
  }
}

// 平均色（安定化）
function getAvgColor(cx, cy, w, imgData) {
  let r = 0, g = 0, b = 0, count = 0;
  const sample = 14;

  for (let i = 0; i < sample; i++) {
    const sx = Math.floor(cx + (Math.random() - 0.5) * 14);
    const sy = Math.floor(cy + (Math.random() - 0.5) * 14);
    if (sx < 0 || sy < 0 || sx >= w) continue;

    const idx = (sy * w + sx) * 4;
    r += imgData[idx];
    g += imgData[idx + 1];
    b += imgData[idx + 2];
    count++;
  }

  return `rgb(${(r / count) | 0}, ${(g / count) | 0}, ${(b / count) | 0})`;
}

// 四角形（半抽象）
function drawQuad(p0, p1, p2, p3, imgData, w) {
  const cx = (p0.x + p1.x + p2.x + p3.x) / 4;
  const cy = (p0.y + p1.y + p2.y + p3.y) / 4;
  const color = getAvgColor(cx, cy, w, imgData);

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(p0.x, p0.y);
  ctx.lineTo(p1.x, p1.y);
  ctx.lineTo(p3.x, p3.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.closePath();
  ctx.fill();
}
</script>
</body>
</html>
